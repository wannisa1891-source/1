<body>

        <div class="sidebar-header">

                            d="M14 6C10.686 6 8 8.686 8 12C8 14.21 9.19 16.14 11 17.19V20H17V17.19C18.81 16.14 20 14.21 20 12C20 8.686 17.314 6 14 6Z"

                                <stop offset="0%" stop-color="#6366f1" />
                                <stop offset="100%" stop-color="#8b5cf6" />
                            </linearGradient>
                        </defs>
                    </svg></div>
                <div class="logo-text"><span class="logo-title">HRM</span><span class="logo-sub">โรงพยาบาล</span></div>
            </div>
            <button class="sidebar-toggle" onclick="toggleSidebar()"><svg width="20" height="20" viewBox="0 0 24 24"
                    fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="3" y1="12" x2="21" y2="12" />
                    <line x1="3" y1="6" x2="21" y2="6" />
                    <line x1="3" y1="18" x2="21" y2="18" />
                </svg></button>
        </div>
        <nav class="sidebar-nav">
            <div class="nav-section"><span class="nav-section-label">ภาพรวม</span><a href="../index.html"
                    class="nav-item" id="nav-dashboard"><svg class="nav-icon" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7" />
                        <rect x="14" y="3" width="7" height="7" />
                        <rect x="14" y="14" width="7" height="7" />
                        <rect x="3" y="14" width="7" height="7" />

            <div class="nav-section"><span class="nav-section-label">โครงสร้างองค์กร</span><a href="departments.html"

                    </svg><span>แผนก</span></a><a href="positions.html" class="nav-item" id="nav-positions"><svg

                    </svg><span>ตำแหน่ง</span></a></div>
            <div class="nav-section"><span class="nav-section-label">พนักงาน</span><a href="employees.html"
                    class="nav-item" id="nav-employees"><svg class="nav-icon" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                        <circle cx="9" cy="7" r="4" />
                    </svg><span>รายชื่อพนักงาน</span></a><a href="licenses.html" class="nav-item" id="nav-licenses"><svg
                        class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                    </svg><span>ใบประกอบวิชาชีพ</span><span class="nav-badge danger">3</span></a><a
                    href="transfers.html" class="nav-item" id="nav-transfers"><svg class="nav-icon" viewBox="0 0 24 24"
                        fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="17 1 21 5 17 9" />

                        <path d="M21 13v2a4 4 0 0 1-4 4H3" />
                    </svg><span>ย้ายแผนก</span></a></div>
            <div class="nav-section"><span class="nav-section-label">การลา</span><a href="leaves.html" class="nav-item"
                    id="nav-leaves"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2">
                        <rect x="3" y="4" width="18" height="18" rx="2" />
                        <line x1="16" y1="2" x2="16" y2="6" />
                        <line x1="8" y1="2" x2="8" y2="6" />
                        <line x1="3" y1="10" x2="21" y2="10" />
                    </svg><span>ระบบลางาน</span><span class="nav-badge warning">5</span></a><a href="resignations.html"
                    class="nav-item" id="nav-resignations"><svg class="nav-icon" viewBox="0 0 24 24" fill="none"

                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />

                    </svg><span>แจ้งลาออก</span></a></div>
            <div class="nav-section"><span class="nav-section-label">พัฒนาบุคลากร</span><a href="training.html"
                    class="nav-item" id="nav-training"><svg class="nav-icon" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2">
                        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" />
                        <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" />
                    </svg><span>ประวัติการฝึกอบรม</span></a><a href="retirement.html" class="nav-item"
                    id="nav-retirement"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2">
                        <path d="M18 8h1a4 4 0 0 1 0 8h-1" />
                        <path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z" />
                    </svg><span>เกษียณอายุ</span><span class="nav-badge info">8</span></a></div>
            <div class="nav-section"><span class="nav-section-label">การอนุมัติ</span><a href="approvals.html"
                    class="nav-item" id="nav-approvals"><svg class="nav-icon" viewBox="0 0 24 24" fill="none"

        <div class="sidebar-footer">
            <div class="user-info">
                <div class="user-avatar">ผ</div>
                <div class="user-details"><span class="user-name">ผู้ดูแลระบบ</span><span class="user-role">HR
                        Administrator</span></div>
            </div>
        </div>
    </aside>

    <main class="main-content">
        <header class="topbar">
            <div class="topbar-left">
                <button class="mobile-menu-btn" onclick="toggleSidebar()"><svg width="22" height="22"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="12" x2="21" y2="12" />
                        <line x1="3" y1="6" x2="21" y2="6" />
                        <line x1="3" y1="18" x2="21" y2="18" />
                    </svg></button>
                <div class="breadcrumb"><span class="breadcrumb-home">HRM</span><svg width="14" height="14"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="9 18 15 12 9 6" />
                    </svg><span class="breadcrumb-current">แผนก</span></div>
            </div>
            <div class="topbar-right">
                <div class="topbar-date"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2">
                        <rect x="3" y="4" width="18" height="18" rx="2" />
                        <line x1="16" y1="2" x2="16" y2="6" />
                        <line x1="8" y1="2" x2="8" y2="6" />
                        <line x1="3" y1="10" x2="21" y2="10" />
                    </svg><span id="currentDate"></span></div>
                <button class="notification-btn" onclick="window.location.href='approvals.html'"><svg width="20"
                        height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
                        <path d="M13.73 21a2 2 0 0 1-3.46 0" />
                    </svg><span class="notif-dot">7</span></button>
            </div>
        </header>

        <div class="page-content">
            <div class="page-header"
                style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px">
                <div>
                    <h1 class="page-title">จัดการแผนก</h1>
                    <p class="page-subtitle">โครงสร้างแผนกและโควตาบุคลากร</p>
                </div>
                <button class="btn btn-primary" onclick="openModal('addDeptModal')">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19" />
                        <line x1="5" y1="12" x2="19" y2="12" />
                    </svg>
                    เพิ่มแผนกใหม่
                </button>
            </div>

            <div id="deptGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px">
            </div>
        </div>
    </main>

    <!-- Add Dept Modal -->
    <div class="modal-overlay" id="addDeptModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">เพิ่มแผนกใหม่</h3><button class="modal-close"
                    onclick="closeModal('addDeptModal')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" />
                    </svg></button>
            </div>
            <div class="form-group"><label class="form-label">ชื่อแผนก *</label><input type="text" class="form-control"
                    placeholder="เช่น แผนกกายภาพบำบัด" /></div>
            <div class="form-group"><label class="form-label">รายละเอียด</label><textarea class="form-control" rows="3"
                    placeholder="คำอธิบายแผนก..." style="resize:vertical"></textarea></div>
            <div class="form-row">
                <div class="form-group"><label class="form-label">โควตาบุคลากร *</label><input type="number"
                        class="form-control" placeholder="จำนวนที่ต้องการ" /></div>
                <div class="form-group"><label class="form-label">หัวหน้าแผนก</label><input type="text"
                        class="form-control" placeholder="ชื่อหัวหน้าแผนก" /></div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('addDeptModal')">ยกเลิก</button>
                <button class="btn btn-primary"
                    onclick="closeModal('addDeptModal');showToast('✓ เพิ่มแผนกใหม่เรียบร้อย','success')">บันทึก</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>
    <script src="../js/app.js"></script>
    <script>
        const depts = [
            { name: 'แผนกพยาบาล', head: 'นางมาลี สุขสันต์', current: 45, quota: 50, desc: 'ดูแลและให้บริการพยาบาลผู้ป่วยทุกประเภท', color: 'linear-gradient(135deg,#6366f1,#8b5cf6)' },
            { name: 'แผนกอายุรกรรม', head: 'นายสุรชัย วงศ์ดี', current: 28, quota: 30, desc: 'วินิจฉัยและรักษาโรคทั่วไปและโรคเรื้อรัง', color: 'linear-gradient(135deg,#10b981,#059669)' },
            { name: 'แผนกศัลยกรรม', head: 'นายวิรัตน์ สุขใจ', current: 18, quota: 25, desc: 'ผ่าตัดและรักษาโรคที่ต้องการการผ่าตัด', color: 'linear-gradient(135deg,#ef4444,#dc2626)' },
            { name: 'แผนกเภสัชกรรม', head: 'นางสาวกาญจนา รักดี', current: 12, quota: 15, desc: 'จ่ายยาและให้คำปรึกษาด้านยา', color: 'linear-gradient(135deg,#f59e0b,#f97316)' },
            { name: 'แผนกรังสีวิทยา', head: 'นายบุญมี ทองดี', current: 8, quota: 10, desc: 'ถ่ายภาพรังสีและวินิจฉัยโรคด้วยภาพ', color: 'linear-gradient(135deg,#06b6d4,#0891b2)' },
            { name: 'แผนกกุมารเวชกรรม', head: 'นางสาวลัดดา มีสุข', current: 20, quota: 22, desc: 'ดูแลรักษาผู้ป่วยเด็กและทารก', color: 'linear-gradient(135deg,#a855f7,#7c3aed)' },
            { name: 'แผนกสูตินรีเวช', head: 'นางกมลา สวยงาม', current: 15, quota: 18, desc: 'ดูแลสุขภาพสตรีและการคลอดบุตร', color: 'linear-gradient(135deg,#ec4899,#db2777)' },
            { name: 'แผนกฉุกเฉิน', head: 'นายสมพงษ์ ทองดี', current: 22, quota: 25, desc: 'รักษาผู้ป่วยฉุกเฉินตลอด 24 ชั่วโมง', color: 'linear-gradient(135deg,#f97316,#ea580c)' },
            { name: 'แผนกห้องผ่าตัด', head: '-', current: 10, quota: 12, desc: 'ห้องผ่าตัดและอุปกรณ์การผ่าตัด', color: 'linear-gradient(135deg,#64748b,#475569)' },
            { name: 'แผนกไตเทียม', head: '-', current: 6, quota: 8, desc: 'บริการฟอกไตและดูแลผู้ป่วยโรคไต', color: 'linear-gradient(135deg,#0ea5e9,#0284c7)' },
            { name: 'แผนกกายภาพบำบัด', head: '-', current: 8, quota: 10, desc: 'ฟื้นฟูสมรรถภาพร่างกายผู้ป่วย', color: 'linear-gradient(135deg,#84cc16,#65a30d)' },
            { name: 'แผนกจิตเวช', head: '-', current: 5, quota: 8, desc: 'ดูแลสุขภาพจิตและรักษาโรคทางจิตเวช', color: 'linear-gradient(135deg,#8b5cf6,#6d28d9)' },
        ];

        function renderDepts() {
            const grid = document.getElementById('deptGrid');
            grid.innerHTML = depts.map(d => {
                const pct = Math.round((d.current / d.quota) * 100);
                const short = d.quota - d.current;
                const barColor = pct >= 90 ? 'linear-gradient(90deg,#10b981,#059669)' : pct >= 70 ? 'linear-gradient(90deg,#f59e0b,#f97316)' : 'linear-gradient(90deg,#ef4444,#dc2626)';
                const shortClass = short > 5 ? 'color:var(--accent-danger)' : short > 2 ? 'color:var(--accent-warning)' : 'color:var(--accent-success)';
                return `
        <div class="card" style="transition:transform 0.2s ease" onmouseenter="this.style.transform='translateY(-3px)'" onmouseleave="this.style.transform=''">
          <div style="padding:20px">
            <div style="display:flex;align-items:flex-start;gap:14px;margin-bottom:16px">
              <div style="width:44px;height:44px;border-radius:var(--radius-md);background:${d.color};display:flex;align-items:center;justify-content:center;flex-shrink:0">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
              </div>
              <div style="flex:1">
                <div style="font-size:15px;font-weight:700;color:var(--text-primary)">${d.name}</div>
                <div style="font-size:12px;color:var(--text-muted);margin-top:2px">${d.desc}</div>
              </div>
            </div>
            <div style="font-size:12px;color:var(--text-secondary);margin-bottom:12px">หัวหน้าแผนก: <span style="color:var(--text-primary);font-weight:500">${d.head}</span></div>
            <div style="margin-bottom:8px">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
                <span style="font-size:12px;color:var(--text-secondary)">โควตาบุคลากร</span>
                <span style="font-size:13px;font-weight:700;color:var(--text-primary)">${d.current} / ${d.quota} คน</span>
              </div>
              <div style="height:8px;background:var(--bg-primary);border-radius:4px;overflow:hidden">
                <div style="height:100%;width:${pct}%;background:${barColor};border-radius:4px;transition:width 1s ease"></div>
              </div>
              <div style="display:flex;justify-content:space-between;margin-top:4px">
                <span style="font-size:11px;color:var(--text-muted)">${pct}%</span>
                <span style="font-size:11px;font-weight:600;${shortClass}">ขาด ${short} คน</span>
              </div>
            </div>
            <div style="display:flex;gap:8px;margin-top:14px;padding-top:14px;border-top:1px solid var(--border-light)">
              <button class="btn btn-secondary btn-sm" style="flex:1" onclick="showToast('ดูรายชื่อพนักงาน (จะเชื่อมกับ Backend)','info')">ดูพนักงาน</button>
              <button class="btn btn-secondary btn-sm" onclick="showToast('แก้ไขแผนก (จะเชื่อมกับ Backend)','info')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
            </div>
          </div>
        </div>`;
            }).join('');
        }

        document.addEventListener('DOMContentLoaded', renderDepts);
    </script>
</body>

</html>
